name: Publish MCP Packages

on:
  push:
    branches:
      - main
    paths:
      - 'server/**/*.toml'
      - 'server/**/*.py'
  workflow_dispatch:  # Allow manual triggering

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      gti_changed: ${{ steps.check_versions.outputs.gti_changed }}
      scc_changed: ${{ steps.check_versions.outputs.scc_changed }}
      secops_changed: ${{ steps.check_versions.outputs.secops_changed }}
      soar_changed: ${{ steps.check_versions.outputs.soar_changed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch all history for proper version comparison
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Check version changes
        id: check_versions
        run: |
          # Function to check if version changed in the package
          check_version_change() {
            local package_path=$1
            local output_var=$2
            
            # Check if package directory exists in the changes
            if git diff --name-only HEAD^ HEAD | grep -q "^server/$package_path/"; then
              # Extract current version
              current_version=$(grep -Po "(?<=version = \").*(?=\")" "server/$package_path/pyproject.toml")
              
              # Get previous version
              prev_version=$(git show HEAD^:server/$package_path/pyproject.toml 2>/dev/null | grep -Po "(?<=version = \").*(?=\")" || echo "0.0.0")
              
              echo "Current $package_path version: $current_version, Previous version: $prev_version"
              
              # Compare versions and set output
              if [ "$current_version" != "$prev_version" ]; then
                echo "$output_var=true" >> $GITHUB_OUTPUT
                echo "$package_path version changed from $prev_version to $current_version"
              else
                echo "$output_var=false" >> $GITHUB_OUTPUT
                echo "$package_path version unchanged"
              fi
            else
              echo "$output_var=false" >> $GITHUB_OUTPUT
              echo "No changes detected in $package_path"
            fi
          }
          
          # Check each package
          check_version_change "gti" "gti_changed"
          check_version_change "scc" "scc_changed"
          check_version_change "secops" "secops_changed"
          check_version_change "secops-soar" "soar_changed"

  request_approval:
    needs: detect_changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect_changes.outputs.gti_changed == 'true' || 
            needs.detect_changes.outputs.scc_changed == 'true' || 
            needs.detect_changes.outputs.secops_changed == 'true' || 
            needs.detect_changes.outputs.soar_changed == 'true' }}
    steps:
      - name: Summarize changes
        id: changes
        run: |
          echo "The following package versions have changed:"
          if [ "${{ needs.detect_changes.outputs.gti_changed }}" == "true" ]; then
            echo "- gti-mcp"
          fi
          if [ "${{ needs.detect_changes.outputs.scc_changed }}" == "true" ]; then
            echo "- scc-mcp"
          fi
          if [ "${{ needs.detect_changes.outputs.secops_changed }}" == "true" ]; then
            echo "- secops-mcp"
          fi
          if [ "${{ needs.detect_changes.outputs.soar_changed }}" == "true" ]; then
            echo "- SoarAS"
          fi
    
    # This creates a manual approval step
    # The workflow will continue only when approved
    environment: production

  publish_gti:
    needs: [detect_changes, request_approval]
    if: ${{ needs.detect_changes.outputs.gti_changed == 'true' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build and publish
        working-directory: ./server/gti
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m build
          python -m twine upload --repository testpypi dist/*
  
  publish_scc:
    needs: [detect_changes, request_approval]
    if: ${{ needs.detect_changes.outputs.scc_changed == 'true' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build and publish
        working-directory: ./server/scc
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m build
          python -m twine upload --repository testpypi dist/*
  
  publish_secops:
    needs: [detect_changes, request_approval]
    if: ${{ needs.detect_changes.outputs.secops_changed == 'true' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build and publish
        working-directory: ./server/secops
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m build
          python -m twine upload --repository testpypi dist/*
  
  publish_soar:
    needs: [detect_changes, request_approval]
    if: ${{ needs.detect_changes.outputs.soar_changed == 'true' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build and publish
        working-directory: ./server/secops-soar
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m build
          python -m twine upload --repository testpypi dist/*
